<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Conectar WhatsApp do Bot</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#0b141a;color:#e9edef;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100vh;margin:0;text-align:center;}
  .card{background:#fff;padding:20px;border-radius:16px;}
  img{display:block;width:300px;height:300px;image-rendering:pixelated;}
  h1{font-size:20px;font-weight:500;margin:0 0 6px;}
  p{color:#8696a0;max-width:380px;line-height:1.5;font-size:15px;}
  .ok{color:#00a884;font-size:22px;font-weight:600;}
  #status{margin-top:14px;font-size:14px;color:#8696a0;}
</style>
</head>
<body>
  <h1>Conectar o WhatsApp do Bot</h1>
  <p>No celular: <b>WhatsApp &rarr; Aparelhos conectados &rarr; Conectar um aparelho</b> e aponte para o código abaixo. Ele se atualiza sozinho — escaneie com calma.</p>
  <div class="card"><img id="qr" src="qr.png" alt="QR Code"></div>
  <div id="status">Aguardando leitura…</div>
<script>
  var img = document.getElementById('qr');
  var status = document.getElementById('status');
  function tick(){
    fetch('wa_status.txt?' + Date.now()).then(function(r){return r.text();}).then(function(t){
      t = (t||'').trim();
      if(t === 'LOGADO'){
        document.querySelector('.card').innerHTML = '<div class="ok">✓ Conectado!</div>';
        status.textContent = 'Pronto! Pode fechar esta aba. O bot já envia em segundo plano.';
        return;
      }
      img.src = 'qr.png?' + Date.now();
      setTimeout(tick, 2500);
    }).catch(function(){ img.src = 'qr.png?' + Date.now(); setTimeout(tick, 2500); });
  }
  tick();
</script>
</body>
</html>
