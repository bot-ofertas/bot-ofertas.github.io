name: Bot Ofertas ML

on:
  schedule:
    # Exatamente a cada 45 minutos das 07h às 22h45 (Brasília = UTC-3)
    # Sequência: 10:00, 10:45, 11:30, 12:15, 13:00, 13:45, 14:30...
    - cron: '0 10,13,16,19,22 * * *'
    - cron: '15 12,15,18,21 * * *'
    - cron: '30 11,14,17,20 * * *'
    - cron: '45 10,11,13,14,16,17,19,20,22 * * *'
  workflow_dispatch:  # permite rodar manualmente no GitHub

permissions:
  contents: write

jobs:
  rastrear:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Restaurar banco de dados (deduplicação)
        uses: actions/cache@v4
        with:
          path: data/bot_ofertas.db
          key: sqlite-db-${{ github.run_number }}
          restore-keys: |
            sqlite-db-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: python -m playwright install chromium --with-deps

      - name: Criar diretórios necessários
        run: mkdir -p data

      - name: Rodar o bot
        env:
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CANAL_GERAL: ${{ secrets.CANAL_GERAL }}
          ML_AFFILIATE_TOOL_ID: ${{ secrets.ML_AFFILIATE_TOOL_ID }}
          PYTHONIOENCODING: utf-8
        run: python rastreador.py

      - name: Salvar banco atualizado no cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/bot_ofertas.db
          key: sqlite-db-${{ github.run_number }}

      - name: Atualizar site (GitHub Pages)
        if: success()
        env:
          PYTHONIOENCODING: utf-8
        run: python export_json.py

      - name: Commitar ofertas no site
        if: success()
        run: |
          git config user.name "Bot-Ofertas"
          git config user.email "bot@github.com"
          git add docs/data/offers.json
          git diff --cached --quiet || git commit -m "chore: atualiza ofertas do site [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
