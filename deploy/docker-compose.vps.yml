services:
  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: bot_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?defina EVOLUTION_API_KEY no .env}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: sqlite
      DATABASE_CONNECTION_URI: "file:./evolution.db"
      CACHE_LOCAL_ENABLED: "true"
      CACHE_REDIS_ENABLED: "false"
      QRCODE_LIMIT: "30"
      LOG_LEVEL: WARN
      LANGUAGE: pt-BR
      DEL_INSTANCE: "false"
      TEMP_KEY_TTL: "3600"
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  rastreador:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bot_rastreador
    restart: always
    depends_on:
      evolution:
        condition: service_healthy
    environment:
      TOKEN_TELEGRAM: ${TOKEN_TELEGRAM:?defina no .env}
      CANAL_GERAL: ${CANAL_GERAL:?defina no .env}
      ML_AFFILIATE_TOOL_ID: ${ML_AFFILIATE_TOOL_ID:-47114387}
      AMAZON_AFFILIATE_TAG: ${AMAZON_AFFILIATE_TAG:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WHATSAPP_WEBHOOK_URL: http://evolution:8080
      WHATSAPP_API_KEY: ${EVOLUTION_API_KEY}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-botofertas}
      WHATSAPP_GROUP_ID: ${WHATSAPP_GROUP_ID:?defina no .env}
      LOOP_MIN: ${LOOP_MIN:-30}
      LOOP_MAX: ${LOOP_MAX:-45}
    volumes:
      - rastreador_data:/app/data
    ports:
      - "8724:8724"  # healthcheck para n8n

  rastreador_amazon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bot_rastreador_amazon
    restart: always
    command: ["python", "-u", "rastreador_amazon.py", "--random", "--loop-min", "45", "--loop-max", "75"]
    depends_on:
      evolution:
        condition: service_healthy
    environment:
      TOKEN_TELEGRAM: ${TOKEN_TELEGRAM:?defina no .env}
      CANAL_GERAL: ${CANAL_GERAL:?defina no .env}
      AMAZON_AFFILIATE_TAG: ${AMAZON_AFFILIATE_TAG:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WHATSAPP_WEBHOOK_URL: http://evolution:8080
      WHATSAPP_API_KEY: ${EVOLUTION_API_KEY}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-botofertas}
      WHATSAPP_GROUP_ID: ${WHATSAPP_GROUP_ID:?defina no .env}
    volumes:
      - rastreador_data:/app/data

volumes:
  evolution_data:
  evolution_store:
  rastreador_data:
